name: Fetch arXiv Metadata

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-arxiv-metadata
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pipeline
        uses: actions/checkout@v4
        with:
          path: repo
          fetch-depth: 0

      - name: Check out data branch
        uses: actions/checkout@v4
        with:
          ref: data
          path: data-worktree
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch arXiv metadata
        working-directory: repo
        env:
          ARXIV_CATEGORIES: ${{ vars.ARXIV_CATEGORIES }}
          ARXIV_MAX_RETRIES: ${{ vars.ARXIV_MAX_RETRIES }}
          ARXIV_REQUEST_DELAY_SECONDS: ${{ vars.ARXIV_REQUEST_DELAY_SECONDS }}
          ARXIV_RETRY_BASE_DELAY_SECONDS: ${{ vars.ARXIV_RETRY_BASE_DELAY_SECONDS }}
          FETCH_DAYS: ${{ vars.FETCH_DAYS }}
          MAX_RESULTS_PER_CATEGORY: ${{ vars.MAX_RESULTS_PER_CATEGORY }}
        run: |
          python scripts/fetch_arxiv.py \
            --data-root ../data-worktree/data \
            --fetch-days "${FETCH_DAYS:-3}" \
            --max-results-per-category "${MAX_RESULTS_PER_CATEGORY:-100}" \
            --request-delay-seconds "${ARXIV_REQUEST_DELAY_SECONDS:-8}" \
            --max-retries "${ARXIV_MAX_RETRIES:-5}" \
            --retry-base-delay-seconds "${ARXIV_RETRY_BASE_DELAY_SECONDS:-30}"

      - name: Validate data
        working-directory: repo
        run: python scripts/validate_data.py --root ../data-worktree/data

      - name: Commit data branch
        working-directory: data-worktree
        run: |
          git config user.name "Codex"
          git config user.email "codex@openai.com"
          git add data
          if git diff --cached --quiet; then
            echo "No metadata changes to commit."
          else
            git commit -m "Update arXiv metadata"
            git push origin data
          fi
